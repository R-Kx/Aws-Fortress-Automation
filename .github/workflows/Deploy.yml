name: Deploy

on:
    workflow_run:
        workflows:
            - "Tf-Apply"
        branches:
            - main
        types:
            - completed
    workflow_dispatch:
    
jobs:
    Deploy:
        if: github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch'
        runs-on: ubuntu-latest
        permissions:
            id-token: write
            contents: read
        steps:
            - name: Checkout code
              uses: actions/checkout@v5
            
            - name: Configure AWS Creds
              uses: aws-actions/configure-aws-credentials@v6
              with:
                role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
                aws-region: ${{ vars.AWS_REGION }}
                role-session-name: GitHUbActions-Deploy-Via-Ansible
            
            - name: Setup Python
              uses: actions/setup-python@v5
              with:
                python-version: '3.11'
                cache: 'pip'

            - name: Setup ansible, python dependensies, SSM Plugin
              run: |
                python -m pip install --upgrade pip
                pip install --no-cache-dir -r ansible/requirements-ans.txt

                ansible-galaxy collection install -r ansible/requirements.yml

                curl "https://s3.amazonaws.com/session-manager-downloads/plugin/latest/ubuntu_64bit/session-manager-plugin.deb" -o "session-manager-plugin.deb"
                sudo dpkg -i session-manager-plugin.deb

            - name: Deploy ansible playbooks
              env:
                ANSIBLE_HOST_KEY_CHECKING: "False"
              run: |
                set +x
                cd ansible
                VAULT_PASS=$(aws secretsmanager get-secret-value --secret-id ${{ secrets.VAULT_SECRET_ARN }} --query SecretString --output text)
                echo "::add-mask::$VAULT_PASS"
                echo "$VAULT_PASS" > .vault_pass
                ansible-playbook sites.yml --vault-password-file .vault_pass
                rm .vault_pass
