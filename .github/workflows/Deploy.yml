name: Deploy

on:
    workflow_call:
    workflow_dispatch:
    
jobs:
    Deploy:
        runs-on: ubuntu-latest
        permissions:
            id-token: write
            contents: read
        steps:
            - name: Checkout code
              uses: actions/checkout@v5
            
            - name: Configure AWS Creds
              uses: aws-actions/configure-aws-credentials@v6
              with:
                role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
                aws-region: ${{ vars.AWS_REGION }}
                role-session-name: GitHUbActions-Deploy-Via-Ansible
            
            - name: Setup Python
              uses: actions/setup-python@v5
              with:
                python-version: '3.11'
                cache: 'pip'

            - name: Setup ansible, python dependensies, SSM Plugin
              run: |
                python -m pip install --upgrade pip
                pip install --no-cache-dir -r ansible/requirements-ans.txt

                ansible-galaxy collection install -r ansible/requirements.yml

                curl "https://s3.amazonaws.com/session-manager-downloads/plugin/latest/ubuntu_64bit/session-manager-plugin.deb" -o "session-manager-plugin.deb"
                sudo dpkg -i session-manager-plugin.deb

            - name: Deploy ansible playbooks
              env:
                ANSIBLE_HOST_KEY_CHECKING: "False"
              run: |
                set +x
                cd ansible
                VAULT_PASS=$(aws secretsmanager get-secret-value --secret-id "${{ secrets.VAULT_SECRET_ARN }}" --query SecretString --output text | tr -d '\n' | tr -d '\r' | xargs)
                echo "Debug: Vault pass length is ${#VAULT_PASS} characters."
                if [ -z "$VAULT_PASS" ]; then
                   echo "ERROR: Vault password is empty! Check if secrets.VAULT_SECRET_ARN is passed to this workflow."
                   exit 1
                fi
                printf "%s" "$VAULT_PASS" > .vault_pass
                chmod 600 .vault_pass
                ansible-playbook sites.yml --vault-password-file ./.vault_pass
                rm -rf .vault_pass
