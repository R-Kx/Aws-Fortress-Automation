name: Lint

on:
 push:
   branches:
     - main
 pull_request:
   branches:
     - main
 workflow_dispatch:
permissions:
  contents: read
  checks: write

jobs:
  Lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir -r requirements-test.txt

      - name: Run Lint
        uses: wearerequired/lint-action@v2
        with:
          flake8: true
          black: false
          auto_fix: false
          continue_on_error: false
      
