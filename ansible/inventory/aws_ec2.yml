plugin: amazon.aws.aws_ec2
regions:
  - eu-central-1
strict: false

hostnames:
  - "instance-id"

filters:
  #"tag:Name":
    #- flask-project
    #- flask-asg
  #"tag:Environment":
    #- DEV
  instance-state-name: running

keyed_groups:
  - key: placement.availability_zone
    prefix: az
  - key: tags.Name
    prefix: name

compose:
  ansible_connection: "'aws_ssm'"
  ansible_host: instance_id
  ansible_aws_ssm_region: "'eu-central-1'"
  ansible_user: "'ssm-user'"
  ansible_aws_ssm_transfer_method: "'piped'"
  ansible_aws_ssm_bucket_name: "'s3-bucket-c75f0d66'"

